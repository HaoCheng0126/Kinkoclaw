<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KinkoClaw Stage</title>
    <link rel="stylesheet" href="./airi-stage.css" />
  </head>
  <body>
    <div class="stage-app" id="app">
      <div class="stage-backdrop">
        <div class="backdrop-ring ring-a"></div>
        <div class="backdrop-ring ring-b"></div>
        <div class="backdrop-stars"></div>
      </div>

      <section class="stage-scene" id="stageScene">
        <div class="scene-toolbar">
          <button class="ghost-button" data-action="settings.open">Connection</button>
          <button class="ghost-button" data-action="gateway.reconnect">Reconnect</button>
          <button class="ghost-button" data-action="chat.debugFallback">Text Chat</button>
          <button class="ghost-button" data-action="window.hide">Hide</button>
        </div>

        <div class="stage-labels">
          <div class="label-chip" id="personaChip">Dreamlink Core</div>
          <div class="label-chip muted" id="connectionChip">Disconnected</div>
        </div>

        <div class="scene-shell" id="sceneShell">
          <div class="scene-aura"></div>
          <div class="character" id="character">
            <div class="character-shadow"></div>
            <div class="character-halo"></div>
            <div class="character-body">
              <div class="hair hair-back"></div>
              <div class="hair-tail tail-left"></div>
              <div class="hair-tail tail-right"></div>
              <div class="outfit"></div>
              <div class="collar"></div>
              <div class="tie"></div>
              <div class="face"></div>
              <div class="blush blush-left"></div>
              <div class="blush blush-right"></div>
              <div class="hair hair-front"></div>
              <div class="ribbon ribbon-left">
                <span></span><span></span>
              </div>
              <div class="ribbon ribbon-right">
                <span></span><span></span>
              </div>
              <div class="eyes">
                <div class="eye eye-left"><span class="shine"></span></div>
                <div class="eye eye-right"><span class="shine"></span></div>
              </div>
              <div class="mouth" id="mouth"></div>
            </div>

            <div class="scene-speech" id="subtitleBubble">
              <div class="subtitle-prefix" id="subtitlePrefix">AIRI</div>
              <div class="subtitle-text" id="subtitleText">Stage is waiting for your gateway.</div>
            </div>
          </div>

          <div class="voice-meter" id="voiceMeter">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      </section>

      <aside class="dialogue-panel">
        <header class="dialogue-header">
          <div>
            <p class="eyebrow">AIRI Stage</p>
            <h1 id="packTitle">AIRI Classic</h1>
          </div>
          <div class="status-stack">
            <div class="status-pill" id="presencePill">idle</div>
            <div class="status-copy" id="statusCopy">Not connected</div>
          </div>
        </header>

        <div class="stream-panel" id="streamPanel">
          <div class="stream-label">Assistant stream</div>
          <div class="stream-text" id="streamText">No active reply</div>
        </div>

        <div class="transcript-panel" id="transcriptPanel">
          <div class="transcript-label">Voice state</div>
          <div class="transcript-copy" id="transcriptCopy">Voice is idle.</div>
        </div>

        <div class="dialogue-feed" id="dialogueFeed"></div>

        <form class="composer" id="composer">
          <label class="composer-label" for="messageInput">Message the `main` assistant</label>
          <textarea id="messageInput" rows="3" placeholder="Talk to AIRI through your existing OpenClaw gateway..."></textarea>
          <div class="composer-actions">
            <button type="button" class="voice-button" id="voiceButton">
              <span class="voice-core"></span>
              Hold to Talk
            </button>
            <button type="submit" class="send-button">Send</button>
          </div>
        </form>
      </aside>

      <div class="toast" id="toast" hidden></div>
    </div>

    <script type="module" src="./airi-stage.js"></script>
  </body>
</html>
